<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DimeX | Master Admin V7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        .admin-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s ease; }
        .admin-card:hover { border-color: rgba(59, 130, 246, 0.5); }
        .gradient-text { background: linear-gradient(90deg, #3b82f6, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-action { transition: all 0.2s ease; cursor: pointer; border-radius: 0.75rem; font-weight: bold; }
        .btn-action:active { transform: scale(0.95); }
        input { background: #0f172a !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; padding: 8px; }
        input:focus { border-color: #3b82f6 !important; }
    </style>
</head>
<body class="bg-[#020617] text-white min-h-screen font-sans pb-20">

    <header class="p-6 border-b border-white/5 bg-[#020617]/80 sticky top-0 z-50 backdrop-blur-md flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black gradient-text tracking-tighter">DIMEX MASTER V7</h1>
            <p id="adminStatus" class="text-[10px] text-slate-500 uppercase tracking-widest">Awaiting Admin Connection...</p>
        </div>
        <button id="connectBtn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 btn-action shadow-lg">Connect Admin</button>
    </header>

    <main id="adminPanel" class="p-6 max-w-[1440px] mx-auto opacity-30 pointer-events-none transition-opacity duration-500">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="admin-card p-5 rounded-2xl border-l-4 border-l-blue-500">
                <p class="text-slate-500 text-xs uppercase font-bold">Staking Totals</p>
                <div class="text-sm mt-1 font-mono">USDT: <span id="statUSDT" class="text-white font-bold">0</span><br>DMX: <span id="statDMX" class="text-cyan-400 font-bold">0</span></div>
            </div>
            <div class="admin-card p-5 rounded-2xl border-l-4 border-l-emerald-500">
                <p class="text-slate-500 text-xs uppercase font-bold text-emerald-400">Claims & Restake</p>
                <div class="text-sm mt-1 font-mono">Retk: <span id="statRestake">0</span><br>Clm: <span id="statClaimed">0</span></div>
            </div>
            <div class="admin-card p-5 rounded-2xl border-l-4 border-l-purple-500">
                <p class="text-slate-500 text-xs uppercase font-bold text-purple-400">Total Payouts</p>
                <div class="text-sm mt-1 font-mono">Dir: <span id="statDirectPaid">0</span><br>Lvl: <span id="statLevelPaid">0</span></div>
            </div>
            <div class="admin-card p-5 rounded-2xl border-l-4 border-l-yellow-500">
                <p class="text-slate-500 text-xs uppercase font-bold text-yellow-400">Network Info</p>
                <div class="text-sm mt-1 font-mono">Pend: <span id="statPending">0</span><br>Users: <span id="statMembersCount">0</span></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <section class="admin-card p-6 rounded-3xl">
                    <h2 class="text-lg font-bold mb-4 text-blue-400 uppercase tracking-tight">⚙️ Protocol Settings</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] text-slate-500 uppercase">Daily Reward BPS (90, 180, 365 days)</label>
                                <div class="flex gap-2 mt-1">
                                    <input id="r90" type="number" placeholder="90d" class="w-1/3 rounded-lg text-center">
                                    <input id="r180" type="number" placeholder="180d" class="w-1/3 rounded-lg text-center">
                                    <input id="r365" type="number" placeholder="365d" class="w-1/3 rounded-lg text-center">
                                    <button onclick="setRates()" class="bg-slate-700 px-3 btn-action text-xs">Update</button>
                                </div>
                            </div>
                            <div class="flex gap-2 items-end">
                                <div class="flex-1"><label class="text-[10px] text-slate-500 uppercase font-bold">Min Claim (18 Dec)</label><input id="minClaim" type="number" class="w-full rounded-lg"></div>
                                <div class="flex-1"><label class="text-[10px] text-slate-500 uppercase font-bold">Base Cap (x4)</label><input id="incCap" type="number" class="w-full rounded-lg"></div>
                                <button onclick="setLimits()" class="bg-slate-700 px-3 py-2 btn-action text-xs">Set</button>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] text-slate-500 uppercase">DMX Price Control (Status: <span id="priceStatus" class="text-white">...</span>)</label>
                                <div class="flex gap-2 mt-1">
                                    <input id="manPrice" type="number" step="0.000001" placeholder="USDT Value" class="flex-1 rounded-lg">
                                    <button onclick="setPrice()" class="bg-blue-900/40 text-blue-400 border border-blue-500/30 px-3 btn-action text-xs">Set</button>
                                    <button onclick="togglePrice()" class="bg-slate-800 px-3 btn-action text-xs">Toggle</button>
                                </div>
                            </div>
                            <div class="flex gap-2 items-end">
                                <div class="flex-1"><label class="text-[10px] text-slate-500 uppercase font-bold">Direct %</label><input id="dirPct" type="number" class="w-full rounded-lg"></div>
                                <div class="flex-1"><label class="text-[10px] text-slate-500 uppercase font-bold">Restake %</label><input id="restkPct" type="number" class="w-full rounded-lg"></div>
                                <button onclick="setBonuses()" class="bg-slate-700 px-3 py-2 btn-action text-xs">Set</button>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="admin-card p-6 rounded-3xl">
                    <h2 class="text-lg font-bold mb-4 text-emerald-400 uppercase tracking-tight">📊 Matrix Configuration</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex gap-2 bg-white/5 p-3 rounded-xl items-end">
                            <div class="w-20"><label class="text-[9px] text-slate-500">Lvl #</label><input id="lvlId" type="number" class="w-full rounded-lg"></div>
                            <div class="flex-1"><label class="text-[9px] text-slate-500">Comm BPS</label><input id="lvlBps" type="number" class="w-full rounded-lg"></div>
                            <button onclick="setLevelPct()" class="bg-emerald-600 px-4 py-2 btn-action text-xs">Set</button>
                        </div>
                        <div class="flex gap-2 bg-white/5 p-3 rounded-xl items-end">
                            <div class="w-20"><label class="text-[9px] text-slate-500">Lvl #</label><input id="volLvlId" type="number" class="w-full rounded-lg"></div>
                            <div class="flex-1"><label class="text-[9px] text-slate-500">Min Volume</label><input id="volAmt" type="number" class="w-full rounded-lg"></div>
                            <button onclick="setLevelVol()" class="bg-purple-600 px-4 py-2 btn-action text-xs">Set</button>
                        </div>
                    </div>
                </section>
            </div>

            <div class="space-y-6">
                <section class="admin-card p-6 rounded-3xl border-l-4 border-l-yellow-500">
                    <h2 class="text-lg font-bold mb-4 text-yellow-400 uppercase tracking-tight">👤 User Controls</h2>
                    <div class="space-y-4">
                        <input id="uAddr" type="text" placeholder="User Address 0x..." class="w-full p-3 rounded-xl text-xs font-mono">
                        
                        <div class="grid grid-cols-2 gap-2">
                            <div class="space-y-1">
                                <label class="text-[9px] text-slate-500 uppercase">Unlock Days</label>
                                <input id="unlDays" type="number" placeholder="30" class="w-full text-xs rounded-lg">
                                <button onclick="unlLevel()" class="w-full bg-blue-600 p-2 btn-action text-[10px]">Manual Unlock</button>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[9px] text-slate-500 uppercase">Custom Cap (X)</label>
                                <input id="custCap" type="number" placeholder="10" class="w-full text-xs rounded-lg">
                                <button onclick="setCustCap()" class="w-full bg-pink-600 p-2 btn-action text-[10px]">Set Cap</button>
                            </div>
                        </div>

                        <div class="pt-2 border-t border-white/5 space-y-2">
                            <div class="flex gap-1">
                                <input id="rankAmt" type="number" placeholder="DMX Amount" class="w-1/2 text-xs rounded-lg">
                                <input id="rankName" type="text" placeholder="Rank Name" class="w-1/2 text-xs rounded-lg">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="resCap()" class="bg-slate-800 p-2 text-[10px] btn-action">Reset 4x Cap</button>
                                <button onclick="giveRank()" class="bg-orange-600/20 text-orange-400 p-2 text-[10px] btn-action border border-orange-500/20">Rank Reward</button>
                            </div>
                        </div>
                    </div>
                </section>

              <section class="admin-card p-6 rounded-3xl">
    <h2 class="text-lg font-bold mb-4 text-blue-400 uppercase tracking-tight">📢 Announcement</h2>
    <div class="space-y-3">
        <input id="annMsg" type="text" placeholder="Announcement Message" class="w-full rounded-lg">
        <input id="annImg" type="text" placeholder="Image URL (optional)" class="w-full rounded-lg">
        <button onclick="postAnn()" class="bg-blue-600 px-4 py-2 btn-action text-xs w-full">
            Post Announcement
        </button>
    </div>
            </section>

                <section class="admin-card p-6 rounded-3xl border-red-500/20 bg-red-500/5">
                    <h2 class="text-lg font-bold mb-4 text-red-400 uppercase tracking-tight">🚨 Emergency</h2>
                    <div class="space-y-2">
                        <div class="flex gap-2">
                            <button onclick="setPause(true)" class="flex-1 bg-red-600 p-2 text-[10px] btn-action">PAUSE</button>
                            <button onclick="setPause(false)" class="flex-1 bg-slate-800 p-2 text-[10px] btn-action">UNPAUSE</button>
                        </div>
                      
                        <div class="pt-2 border-t border-white/5 space-y-2">
                            <input id="ewTok" type="text" placeholder="Token Contract" class="w-full p-2 text-[10px] rounded-lg">
                            <input id="ewRec" type="text" placeholder="Recipient" class="w-full p-2 text-[10px] rounded-lg">
                            <input id="ewAmt" type="number" placeholder="Amount" class="w-full p-2 text-[10px] rounded-lg">
                            <button onclick="emgWithdraw()" class="w-full bg-red-900/60 text-white p-2 text-xs btn-action">Withdraw Assets</button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        const ADMIN_WALLET = "0x53ba2d865be750d0e2d4d01bcb0a46ec1684c46b"; 
        const TARGET_CHAIN = 56; // BSC Mainnet
        const contractAddress = "YOUR_CONTRACT_ADDRESS";
        
        const abi = [
            "function totalUSDTStaked() view returns (uint256)", "function totalStakedAllUsers() view returns (uint256)",
            "function totalClaimedDMX() view returns (uint256)", "function totalDirectPaid() view returns (uint256)",
            "function totalLevelPaid() view returns (uint256)", "function totalRestakeDMX() view returns (uint256)",
            "function getTotalPendingClaims() view returns (uint256)", "function getMembersCount() view returns (uint256)",
            "function isManualPrice() view returns (bool)", "function setDailyRewardPercent(uint256,uint256,uint256)", 
            "function setMinimumClaim(uint256)", "function setIncomeCap(uint256)", "function setDirectPercent(uint256)",
            "function setLevelPercent(uint256,uint256)", "function setLevelUnlockVolume(uint256,uint256)",
            "function setRestakeBonus(uint256)", "function setManualPrice(uint256)",
            "function toggleManualPrice(bool)", "function unlockLevelManually(address,uint256)",
            "function resetCap(address)", "function giveRankReward(address,uint256,string)", 
            "function emergencyWithdrawToken(address,address,uint256)",
            "function pause()", "function unpause()", "function setCustomCap(address,uint256)",
            "function postAnnouncement(string,string)",
        ];

        let provider, signer, contract;

        async function connect() {
            if (!window.ethereum) return alert("Please install MetaMask");
            
            provider = new ethers.providers.Web3Provider(window.ethereum);
            
            // ⚠️ Upgrade 5: Network Check
            const network = await provider.getNetwork();
            if (network.chainId !== TARGET_CHAIN) {
                alert(`Wrong Network! Please switch to BSC Mainnet (ChainID: ${TARGET_CHAIN})`);
                return;
            }

            const accounts = await provider.send("eth_requestAccounts", []);
            
            // Access Control
            if (accounts[0].toLowerCase() !== ADMIN_WALLET.toLowerCase()) {
                alert("ACCESS DENIED: Not authorized admin wallet.");
                return;
            }

            signer = provider.getSigner();
            contract = new ethers.Contract(contractAddress, abi, signer);
            
            document.getElementById('adminPanel').style.opacity = "1";
            document.getElementById('adminPanel').style.pointerEvents = "all";
            document.getElementById('connectBtn').innerText = "Admin Connected";
            document.getElementById('adminStatus').innerText = "Verified: " + accounts[0].slice(0,6)+"..."+accounts[0].slice(-4);
            
            loadStats();
        }

        async function loadStats() {
            try {
                const s = await Promise.all([
                    contract.totalUSDTStaked(), contract.totalStakedAllUsers(),
                    contract.totalClaimedDMX(), contract.totalDirectPaid(),
                    contract.totalLevelPaid(), contract.totalRestakeDMX(),
                    contract.getTotalPendingClaims(), contract.getMembersCount(),
                    contract.isManualPrice()
                ]);
                const f = ethers.utils.formatEther;
                document.getElementById('statUSDT').innerText = f(s[0]);
                document.getElementById('statDMX').innerText = f(s[1]);
                document.getElementById('statClaimed').innerText = f(s[2]);
                document.getElementById('statDirectPaid').innerText = f(s[3]);
                document.getElementById('statLevelPaid').innerText = f(s[4]);
                document.getElementById('statRestake').innerText = f(s[5]);
                document.getElementById('statPending').innerText = f(s[6]);
                document.getElementById('statMembersCount').innerText = s[7].toString();
                document.getElementById('priceStatus').innerText = s[8] ? "MANUAL" : "AUTO";
            } catch(e) { console.error("Data Sync Error:", e); }
        }

        const txWrap = async (fn) => { 
            try { 
                const tx = await fn; 
                await tx.wait(); 
                alert("Success: Transaction Confirmed!"); 
                loadStats(); 
            } catch(e) { 
                alert("Transaction Failed! Details in console."); 
                console.error(e); 
            } 
        };

        // Actions with Decimal Reminders
        async function setRates() { txWrap(contract.setDailyRewardPercent(document.getElementById('r90').value, document.getElementById('r180').value, document.getElementById('r365').value)); }
        
        async function setLimits() {
            // Confirming 18 decimals
            const minClm = ethers.utils.parseUnits(document.getElementById('minClaim').value, 18);
            const cap = document.getElementById('incCap').value;
            if(document.getElementById('minClaim').value) await txWrap(contract.setMinimumClaim(minClm));
            if(cap) await txWrap(contract.setIncomeCap(cap));
        }

        async function setPrice() { 
            const price = ethers.utils.parseUnits(document.getElementById('manPrice').value, 18);
            txWrap(contract.setManualPrice(price)); 
        }

        async function setLevelVol() { 
            const vol = ethers.utils.parseUnits(document.getElementById('volAmt').value, 18);
            txWrap(contract.setLevelUnlockVolume(document.getElementById('volLvlId').value, vol)); 
        }

        async function unlLevel() { 
            const days = document.getElementById('unlDays').value || 30;
            if(!document.getElementById('unlDays').value) {
                if(!confirm("No days entered. Defaulting to 30 days. Proceed?")) return;
            }
            txWrap(contract.unlockLevelManually(document.getElementById('uAddr').value, days)); 
        }

        async function setCustCap() { txWrap(contract.setCustomCap(document.getElementById('uAddr').value, document.getElementById('custCap').value)); }
        
        async function emgWithdraw() { 
            const amt = ethers.utils.parseUnits(document.getElementById('ewAmt').value, 18);
            txWrap(contract.emergencyWithdrawToken(document.getElementById('ewTok').value, document.getElementById('ewRec').value, amt)); 
        }

      async function postAnn() {
    const msg = document.getElementById('annMsg').value;
    const img = document.getElementById('annImg').value;
    txWrap(contract.postAnnouncement(msg, img));
      }

        // Generic Boilerplate Actions
        async function setBonuses() { 
            if(document.getElementById('dirPct').value) await txWrap(contract.setDirectPercent(document.getElementById('dirPct').value));
            if(document.getElementById('restkPct').value) await txWrap(contract.setRestakeBonus(document.getElementById('restkPct').value));
        }
        async function togglePrice() { const cur = await contract.isManualPrice(); txWrap(contract.toggleManualPrice(!cur)); }
        async function setLevelPct() { txWrap(contract.setLevelPercent(document.getElementById('lvlId').value, document.getElementById('lvlBps').value)); }
        async function resCap() { txWrap(contract.resetCap(document.getElementById('uAddr').value)); }
        async function giveRank() { txWrap(contract.giveRankReward(document.getElementById('uAddr').value, ethers.utils.parseUnits(document.getElementById('rankAmt').value, 18), document.getElementById('rankName').value)); }
        async function setPause(s) { txWrap(s ? contract.pause() : contract.unpause()); }

        document.getElementById('connectBtn').onclick = connect;
    </script>
</body>
</html>
